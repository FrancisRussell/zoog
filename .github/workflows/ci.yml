on: [push]

name: CI

env:
  CMAKE_POLICY_VERSION_MINIMUM: 3.5

jobs:
  check-build:
    name: Check build
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl, x86_64-pc-windows-gnu, i686-pc-windows-gnu]
        platform: [ubuntu-latest]
        include:
          - target: x86_64-apple-darwin
            platform: macos-latest
          - target: aarch64-apple-darwin
            platform: macos-latest
          - target: x86_64-unknown-linux-musl
            apt_packages: musl-dev
          - target: x86_64-pc-windows-gnu
            apt_packages: gcc-mingw-w64-x86-64-posix
          - target: i686-pc-windows-gnu
            apt_packages: gcc-mingw-w64-i686-posix
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v3
      - uses: FrancisRussell/ferrous-actions@v1
        name: Cargo Cache
        with:
          command: cache
      - uses: FrancisRussell/ferrous-actions@v1
        name: Install Rustup
        with:
          command: install-rustup
          toolchain: stable
          target: ${{ matrix.target }}
          profile: minimal
          default: true
      - name: Install apt packages
        if: ${{ matrix.apt_packages != '' }}
        run: sudo apt-get install -y --no-install-recommends ${{ matrix.apt_packages }}
      - uses: FrancisRussell/ferrous-actions@v1
        name: Cargo build
        with:
          command: cargo build
          args: --target=${{ matrix.target }}
      - uses: actions/upload-artifact@v6.0.0
        with:
          name: zoog-debug-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/debug/opusgain
            target/${{ matrix.target }}/debug/opusgain.exe
            target/${{ matrix.target }}/debug/zoogcomment
            target/${{ matrix.target }}/debug/zoogcomment.exe
          if-no-files-found: error

  cargo-test:
    name: Cargo test
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v3
      - uses: FrancisRussell/ferrous-actions@v1
        name: Cargo cache
        with:
          command: cache
      - uses: FrancisRussell/ferrous-actions@v1
        name: Install Rustup
        with:
          command: install-rustup
          toolchain: nightly
          profile: minimal
          default: true
      - uses: FrancisRussell/ferrous-actions@v1
        name: Build library without cli feature
        with:
          command: cargo build
          args: --lib --no-default-features --features audiopus_sys/static
      - uses: FrancisRussell/ferrous-actions@v1
        name: Run tests
        with:
          command: cargo test

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: FrancisRussell/ferrous-actions@v1
        name: Cargo cache
        with:
          command: cache
      - uses: FrancisRussell/ferrous-actions@v1
        name: Install Rustup
        with:
            command: install-rustup
            toolchain: nightly
            components: clippy
            default: true
      - uses: FrancisRussell/ferrous-actions@v1
        name: Clippy
        with:
          command: cargo clippy
